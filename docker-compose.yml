services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: freelancer_finances_container
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "${DATABASE_PORT}:5432" # Sigue expuesto en el 5444 para tus herramientas de diseño (DBeaver, pgAdmin, etc.)
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot Backend ──────────────────────────────────────────────────────
  app:
    build: .
    container_name: freelancer_finances_app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Mapeamos las variables que tu application.properties espera recibir
      DB_HOST: db # Nombre del servicio de arriba
      DB_PORT: 5432 # Puerto interno del contenedor de Postgres
      DB_NAME: freelancer_finances_db
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      db:
        condition: service_healthy # No arranca hasta que el healthcheck de la DB sea exitoso

volumes:
  postgres_data:
