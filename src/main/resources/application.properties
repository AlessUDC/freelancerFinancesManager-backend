# ── Base de Datos ────────────────────────────────────────────────────────────
# Si existe la variable DB_HOST (pasada por Docker), la usa. Si no, usa localhost.
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5444}/${DB_NAME:freelancer_finances_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Servidor ─────────────────────────────────────────────────────────────────
server.port=${APP_PORT:8080}

# ── JWT ──────────────────────────────────────────────────────────────────────
# PRODUCCION: sobreescribir JWT_SECRET con un secreto seguro en las variables de entorno.
# El valor por defecto solo es aceptable en desarrollo local.
app.jwt.secret=${JWT_SECRET:local-dev-secret-change-in-prod-must-be-32chars-min}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}